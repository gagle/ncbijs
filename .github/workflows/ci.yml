name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t build
      - uses: actions/cache/save@v4
        with:
          path: packages/*/dist
          key: dist-${{ matrix.node-version }}-${{ github.sha }}

  lint:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t lint
      - run: pnpm nx run-many -t typecheck

  test:
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/restore@v4
        with:
          path: packages/*/dist
          key: dist-${{ matrix.node-version }}-${{ github.sha }}
      - run: pnpm nx run-many -t test -- --coverage
      - uses: actions/upload-artifact@v4
        if: matrix.node-version == 22
        with:
          name: coverage
          path: packages/*/coverage/

  e2e:
    needs: [setup]
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/restore@v4
        with:
          path: packages/*/dist
          key: dist-${{ matrix.node-version }}-${{ github.sha }}
      - run: pnpm nx run ncbijs-e2e:e2e
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}

  ci-status:
    if: always() && github.event_name == 'workflow_dispatch'
    needs: [lint, test, e2e]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post CI status to commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            STATE=failure
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            STATE=error
          else
            STATE=success
          fi
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f context="CI" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="lint, test, e2e"
