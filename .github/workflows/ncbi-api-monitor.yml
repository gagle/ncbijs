name: NCBI API Monitor

on:
  schedule:
    - cron: '0 9 * * 1' # Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect NCBI API changes
        id: detect
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          pnpm tsx scripts/ncbi-api-monitor/detect.ts > /tmp/report.json
          cat /tmp/report.json

          CHANGE_COUNT=$(jq '.changes | length' /tmp/report.json)
          echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Count actionable changes
        id: actionable
        run: |
          COUNT=$(jq '[.changes[] | select(.severity == "high" or .severity == "medium")] | length' /tmp/report.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Ensure issue label exists
        if: steps.actionable.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create ncbi-api-monitor --description "Automated NCBI API change detection" --color "d93f0b" --force

      - name: Check for existing open issue
        if: steps.actionable.outputs.count != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list --label ncbi-api-monitor --state open --json number --jq length)
          echo "open_issues=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Format report
        if: steps.actionable.outputs.count != '0' && steps.existing.outputs.open_issues == '0'
        id: format
        run: |
          TITLE=$(jq -r '
            "NCBI API changes detected (\(.date | split("T")[0])): \(.summary)"
          ' /tmp/report.json)

          BODY=$(jq -r '
            "## NCBI API Changes Detected\n\n" +
            "**Summary**: \(.summary)\n\n" +

            (if ([.changes[] | select(.severity == "high")] | length) > 0 then
              "### :red_circle: HIGH (action required)\n\n" +
              ([.changes[] | select(.severity == "high") |
                if (.affectedPackages | length) > 0 then
                  "- **\(.affectedPackages | join(", "))**: \(.description)"
                else
                  "- \(.description)"
                end
              ] | join("\n")) + "\n\n"
            else "" end) +

            (if ([.changes[] | select(.severity == "medium")] | length) > 0 then
              "### :orange_circle: MEDIUM (investigate)\n\n" +
              ([.changes[] | select(.severity == "medium") |
                if (.affectedPackages | length) > 0 then
                  "- **\(.affectedPackages | join(", "))**: \(.description)"
                else
                  "- \(.description)"
                end
              ] | join("\n")) + "\n\n"
            else "" end) +

            (if ([.changes[] | select(.severity == "low")] | length) > 0 then
              "### :white_circle: LOW (informational)\n\n" +
              ([.changes[] | select(.severity == "low") |
                if (.affectedPackages | length) > 0 then
                  "- **\(.affectedPackages | join(", "))**: \(.description)"
                else
                  "- \(.description)"
                end
              ] | join("\n")) + "\n\n"
            else "" end) +

            (if (.errors | length) > 0 then
              "### Errors\n\n" +
              ([.errors[] | "- \(.)"] | join("\n")) + "\n\n"
            else "" end) +

            "---\n\nRun the `/ncbi-check-updates` skill locally to investigate and apply fixes."
          ' /tmp/report.json)

          {
            echo "title=$TITLE"
            echo 'body<<__BODY_EOF__'
            echo "$BODY"
            echo '__BODY_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Open GitHub issue
        if: steps.actionable.outputs.count != '0' && steps.existing.outputs.open_issues == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.format.outputs.title }}
          BODY: ${{ steps.format.outputs.body }}
        run: |
          gh issue create --title "$TITLE" --body "$BODY" --label "ncbi-api-monitor"

      - name: Resolve notification email
        if: steps.actionable.outputs.count != '0' && steps.existing.outputs.open_issues == '0'
        id: email
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EMAIL=$(gh api /users/${{ github.actor }} --jq .email)
          if [ -z "$EMAIL" ] || [ "$EMAIL" = "null" ]; then
            echo "::warning::GitHub profile email for ${{ github.actor }} is private; skipping email notification. Set 'Public email' in https://github.com/settings/profile to enable."
            echo "email=" >> "$GITHUB_OUTPUT"
          else
            echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: Render body as HTML via GitHub Markdown API
        if: steps.actionable.outputs.count != '0' && steps.existing.outputs.open_issues == '0' && steps.email.outputs.email != ''
        id: html
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BODY: ${{ steps.format.outputs.body }}
        run: |
          HTML=$(gh api -X POST /markdown -f text="$BODY" -f mode=gfm) || HTML=""
          {
            echo 'html<<__HTML_EOF__'
            echo "$HTML"
            echo '__HTML_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Send email notification
        if: steps.actionable.outputs.count != '0' && steps.existing.outputs.open_issues == '0' && steps.email.outputs.email != ''
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_TO: ${{ steps.email.outputs.email }}
          TITLE: ${{ steps.format.outputs.title }}
          BODY: ${{ steps.format.outputs.body }}
          HTML: ${{ steps.html.outputs.html }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY not set; skipping email notification."
            exit 0
          fi
          if [ -n "$HTML" ]; then
            PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              --arg html "$HTML" \
              --arg to "$NOTIFY_TO" \
              '{from: "NCBI API Monitor <onboarding@resend.dev>", to: [$to], subject: $title, text: $body, html: $html}')
          else
            PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              --arg to "$NOTIFY_TO" \
              '{from: "NCBI API Monitor <onboarding@resend.dev>", to: [$to], subject: $title, text: $body}')
          fi
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          echo "✓ Email sent to $NOTIFY_TO"

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ncbi-check-updates/
          git diff --cached --quiet || {
            git commit -m "chore(workspace): update NCBI API monitor baselines"
            git pull --rebase origin main
            git push
          }
