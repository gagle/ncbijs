version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      nx:
        patterns: ['nx', '@nx/*']
      vitest:
        patterns: ['vitest', '@vitest/*']
      eslint:
        patterns: ['eslint', '@eslint/*', 'typescript-eslint']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
